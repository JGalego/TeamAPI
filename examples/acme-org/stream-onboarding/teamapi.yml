teamApiVersion: "1.0.0"
id: stream-onboarding
info:
  name: Stream Onboarding
  focus: Customer sign-up, KYC verification, and account activation
  type: stream-aligned
channels:
  - type: slack
    name: stream-onboarding
searchTerms:
  - term: onboarding
  - term: kyc
  - term: sign-up
services:
  - name: onboarding-api
    repository: https://github.com/acme-example/onboarding-api
    versioning:
      type: semantic
    boundedContext:
      ubiquitousLanguage:
        - term: Applicant
          definition: A prospective customer who has started but not finished sign-up
      aggregates:
        - Applicant
      publishedEvents:
        - ApplicantActivated
      subscribedEvents: []
roles:
  - id: tech-lead
    name: Onboarding Tech Lead
    kind: TechLead
    responsibilities:
      - Onboarding architecture
    reportsToRef:
      teamName: Platform Payments
      roleId: head-of-engineering
      $ref: ../platform-payments/teamapi.yml
    alignsWith:
      - teamName: Enabling DevEx
        roleId: coach
        $ref: ../enabling-devex/teamapi.yml
  - id: engineer
    name: Onboarding Engineer
    kind: Engineer
    responsibilities:
      - onboarding-api development
    reportsTo: tech-lead
members:
  - id: noah-fischer
    name: Noah Fischer
    contact: noah.fischer@acme.example
    roleIds: [tech-lead]
    allocation: 100
  - id: aisha-bello
    name: Aisha Bello
    contact: aisha.bello@acme.example
    roleIds: [engineer]
    allocation: 100
cognitiveLoad:
  intrinsic: 4
  extraneous: 2
  germane: 5
  notes: Well-bounded domain, low incidental complexity.
meetings:
  - purpose: daily sync
    dayOfWeek: Monday
    timeOfDay: "09:15"
    durationMinutes: 15
interactions:
  - teamName: Enabling DevEx
    mode: facilitating
    purpose: Improve end-to-end test automation for the sign-up flow
    startDate: "2026-05-01"
    expectedDuration: 6
    expectedDurationUnit: weeks
    $ref: ../enabling-devex/teamapi.yml
dependencies:
  - teamName: Platform Payments
    description: Onboarding relies on the payments platform's KYC verification integration
    type: OK
    $ref: ../platform-payments/teamapi.yml
policies:
  - id: no-agents-on-applicant-pii
    name: No autonomous AI agents on applicant PII
    category: security
    severity: blocking
    description: >
      Applicant data (KYC documents, identity-verification results) is regulated PII. No AI agent
      may be granted read or tool access to onboarding-api or its data stores until a compliance
      review of agent data handling is complete.
    rules:
      - key: agents_allowed
        value: false
    enforcedBy: [manual-review:compliance]
    tags: [pii, compliance, agents]
memory:
  - id: why-no-agents-yet
    title: Why Stream Onboarding runs no AI agents (yet)
    kind: architecture-decision
    body: >
      Every other team at Acme has started delegating review, test-generation, or security-scanning
      work to AI agents. We deliberately haven't: this is the only team whose services touch raw
      KYC documents, and nobody has answered "where does the agent's context window go after it
      reads a passport scan" to Legal's satisfaction. Revisit once the agent-provider data-handling
      addendum is signed; see policies/no-agents-on-applicant-pii in the meantime.
    tags: [agents, pii, compliance]
    contributors: [noah-fischer]
