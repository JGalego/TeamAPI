name: Team API Preview

on:
  pull_request:
    paths:
      - "examples/acme-org/**/teamapi.yml"

permissions:
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate and preview examples/acme-org
        uses: ./.github/actions/validate
        with:
          patterns: examples/acme-org
          render-scope: org-hierarchy
